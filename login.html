<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>VolunteerView | Login</title>

    <link rel="stylesheet"
          href="css/login.css">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="container">

<div class="left">

<img src="images/login.png">

</div>


<div class="right">

<form id="loginForm">

<h1>

Welcome Back

</h1>

<p>

Login to VolunteerView

</p>


<div class="input-box">

<i class="fa-solid fa-envelope"></i>

<input

type="email"

id="email"

placeholder="Email"

required>

</div>


<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input

type="password"

id="password"

placeholder="Password"

required>

</div>

<button type="submit">

Login

</button>

<p class="register">

Don't have an account?

<a href="register.html">

Register

</a>

</p>

<p id="message"></p>

</form>

</div>

</div>

<script src="js/login.js"></script>

</body>

</html>
