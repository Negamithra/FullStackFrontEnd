<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Volunteer Enrollments</title>

    <link rel="stylesheet"
          href="css/enrollment-list.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <!-- Sidebar -->

    <div class="sidebar">

        <div class="logo">

            VolunteerView

        </div>

        <ul>

            <li onclick="location.href='coordinator-dashboard.html'">

                <i class="fa-solid fa-chart-line"></i>

                Dashboard

            </li>

            <li onclick="location.href='organization-list.html'">

                <i class="fa-solid fa-building"></i>

                Organizations

            </li>

            <li onclick="location.href='opportunity-list.html'">

                <i class="fa-solid fa-hand-holding-heart"></i>

                Opportunities

            </li>

            <li class="active">

                <i class="fa-solid fa-users"></i>

                Volunteer Enrollments

            </li>

            <li onclick="location.href='impact-report-list.html'">

                <i class="fa-solid fa-file-lines"></i>

                Impact Reports

            </li>

            <li id="logout">

                <i class="fa-solid fa-right-from-bracket"></i>

                Logout

            </li>

        </ul>

    </div>

    <!-- Main Content -->

    <div class="main">

        <div class="header">

            <h1>

                Volunteer Enrollments

            </h1>

            <p>

                View all volunteer enrollments

            </p>

        </div>

        <!-- Search -->

        <div class="search-box">

            <input
                type="text"
                id="search"
                placeholder="Search by Volunteer or Opportunity">

            <i class="fa-solid fa-magnifying-glass"></i>

        </div>

        <!-- Table -->

        <div class="table-container">

            <table>

                <thead>

                    <tr>

                        <th>ID</th>

                        <th>Volunteer</th>

                        <th>Opportunity</th>

                        <th>Enrolled At</th>

                        <th>Approved At</th>

                        <th>Hours</th>

                        <th>Notes</th>

                    </tr>

                </thead>

                <tbody id="enrollmentTable">

                </tbody>

            </table>

        </div>

    </div>

    <script src="js/enrollment-list.js"></script>

</body>

</html>
