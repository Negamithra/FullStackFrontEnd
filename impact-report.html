<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Submit Impact Report</title>

    <link rel="stylesheet"
          href="css/impact-report.css">

    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <!-- Sidebar -->

    <div class="sidebar">

        <div class="logo">

            VolunteerView

        </div>

        <ul>

            <li onclick="location.href='volunteer-dashboard.html'">

                <i class="fa-solid fa-house"></i>

                Dashboard

            </li>

            <li onclick="location.href='browse-opportunities.html'">

                <i class="fa-solid fa-hand-holding-heart"></i>

                Browse Opportunities

            </li>

            <li onclick="location.href='my-enrollments.html'">

                <i class="fa-solid fa-users"></i>

                My Enrollments

            </li>

            <li class="active">

                <i class="fa-solid fa-file-lines"></i>

                Submit Report

            </li>

            <li onclick="location.href='profile.html'">

                <i class="fa-solid fa-user"></i>

                My Profile

            </li>

            <li id="logout">

                <i class="fa-solid fa-right-from-bracket"></i>

                Logout

            </li>

        </ul>

    </div>

    <!-- Main Content -->

    <div class="main">

        <div class="form-container">

            <h1>

                Submit Impact Report

            </h1>

            <form id="reportForm">

                <label>

                    Volunteer Enrollment

                </label>

                <select id="volunteerEnrollmentId" required>

                    <option value="">

                        Select Enrollment

                    </option>

                </select>

                <label>

                    Summary

                </label>

                <textarea
                        id="summary"
                        rows="5"
                        placeholder="Describe your volunteering experience..."
                        required></textarea>

                <label>

                    Hours Contributed

                </label>

                <input
                        type="number"
                        id="hoursContributed"
                        step="0.5"
                        min="1"
                        required>

                <label>

                    Beneficiaries Served

                </label>

                <input
                        type="number"
                        id="beneficiariesServed"
                        min="1"
                        required>

                <label>

                    Rating (1 - 5)

                </label>

                <input
                        type="number"
                        id="rating"
                        min="1"
                        max="5"
                        required>

                <button type="submit">

                    Submit Report

                </button>

            </form>

        </div>

    </div>

    <script src="js/impact-report.js"></script>

</body>

</html>
