<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Organization Management</title>

    <link rel="stylesheet"
          href="css/organization-management.css">

</head>

<body>

    <header>

        <h1>VolunteerView</h1>

        <div class="header-buttons">

            <button id="dashboardBtn">
                Dashboard
            </button>

            <button id="logoutBtn">
                Logout
            </button>

        </div>

    </header>

    <div class="container">

        <h2>Organization Management</h2>

        <div class="form-card">

            <input
                type="hidden"
                id="organizationId">

            <div class="form-group">

                <label>Organization Name</label>

                <input
                    type="text"
                    id="name"
                    placeholder="Enter organization name">

            </div>

            <div class="form-group">

                <label>Mission</label>

                <textarea
                    id="mission"
                    rows="4"
                    placeholder="Enter organization mission"></textarea>

            </div>

            <div class="form-group">

                <label>Address</label>

                <textarea
                    id="address"
                    rows="3"
                    placeholder="Enter organization address"></textarea>

            </div>

            <div class="form-group">

                <label>Contact Email</label>

                <input
                    type="email"
                    id="contactEmail"
                    placeholder="Enter contact email">

            </div>

            <div class="form-group">

                <label>Contact Phone</label>

                <input
                    type="text"
                    id="contactPhone"
                    placeholder="Enter 10 digit phone number">

            </div>

            <div class="form-group">

                <label>Founded Year</label>

                <input
                    type="number"
                    id="foundedYear"
                    placeholder="2020">

            </div>

            <div class="form-group">

                <label>Coordinator ID</label>

                <input
                    type="number"
                    id="coordinatorId"
                    placeholder="Enter coordinator user ID">

            </div>

            <div class="button-group">

                <button id="createBtn">
                    Create Organization
                </button>

                <button id="updateBtn">
                    Update Organization
                </button>

                <button id="clearBtn">
                    Clear
                </button>

            </div>

        </div>

        <div class="table-section">

            <div class="table-header">

                <h3>Organizations</h3>

                <button id="loadBtn">
                    Refresh
                </button>

            </div>

            <table>

                <thead>

                    <tr>

                        <th>ID</th>

                        <th>Name</th>

                        <th>Mission</th>

                        <th>Address</th>

                        <th>Email</th>

                        <th>Phone</th>

                        <th>Year</th>

                        <th>Coordinator</th>

                        <th>Actions</th>

                    </tr>

                </thead>

                <tbody id="organizationTableBody">

                </tbody>

            </table>

        </div>

    </div>

    <script src="js/config.js"></script>

    <script src="js/organization-management.js"></script>

</body>

</html>
