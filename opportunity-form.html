<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>VolunteerView | Opportunity Form</title>

    <link rel="stylesheet" href="css/opportunity-form.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="container">

    <div class="card">

        <h1 id="title">Add Opportunity</h1>

        <form id="opportunityForm">

            <div class="inputBox">
                <label>Opportunity Title</label>
                <input type="text"
                       id="titleInput"
                       placeholder="Enter title"
                       required>
            </div>

            <div class="inputBox">
                <label>Description</label>
                <textarea id="description"
                          rows="5"
                          placeholder="Enter description"
                          required></textarea>
            </div>

            <div class="inputBox">
                <label>Location</label>
                <input type="text"
                       id="location"
                       placeholder="Enter location"
                       required>
            </div>

            <div class="inputBox">
                <label>Start Date & Time</label>
                <input type="datetime-local"
                       id="startDate"
                       required>
            </div>

            <div class="inputBox">
                <label>End Date & Time</label>
                <input type="datetime-local"
                       id="endDate"
                       required>
            </div>

            <div class="inputBox">
                <label>Maximum Volunteers</label>
                <input type="number"
                       id="maxVolunteers"
                       min="1"
                       required>
            </div>

            <div class="inputBox">

                <label>Status</label>

                <select id="status">

                    <option value="OPEN">OPEN</option>

                    <option value="CLOSED">CLOSED</option>

                    <option value="COMPLETED">COMPLETED</option>

                </select>

            </div>

            <div class="inputBox">
                <label>Organization ID</label>
                <input type="number"
                       id="organizationId"
                       required>
            </div>

            <div class="buttons">

                <button type="submit">

                    <i class="fa-solid fa-floppy-disk"></i>

                    Save Opportunity

                </button>

                <button type="button"
                        class="cancel"
                        onclick="window.location.href='manage-opportunities.html'">

                    <i class="fa-solid fa-arrow-left"></i>

                    Cancel

                </button>

            </div>

        </form>

    </div>

</div>

<script src="js/opportunity-form.js"></script>

</body>

</html>
