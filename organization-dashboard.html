<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organization Dashboard</title>

    <link rel="stylesheet" href="css/organization-dashboard.css">
</head>

<body>

    <header>
        <h1>VolunteerView</h1>

        <button id="logoutBtn">Logout</button>
    </header>

    <div class="container">

        <h2>Organization Coordinator Dashboard</h2>

        <p id="welcomeText"></p>

        <div class="card-container">

            <div class="card">
                <h3>Organization Management</h3>
                <p>Create, Update and Manage your Organization.</p>

                <button id="organizationBtn">
                    Manage Organization
                </button>
            </div>

            <div class="card">
                <h3>Opportunity Management</h3>

                <p>Create and Manage Volunteer Opportunities.</p>

                <button id="opportunityBtn">
                    Manage Opportunities
                </button>

            </div>

        </div>

    </div>

    
    <script src="js/organization-dashboard.js"></script>

</body>

</html>
